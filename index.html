<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽獎轉盤</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- 引入 Google Fonts：使用 Noto Sans TC 粗黑體來呈現活潑感 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        /* 活潑明亮的水藍色漸層背景 */
        body {
            background: linear-gradient(135deg, #e0f4ff 0%, #99d6ff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* 改為靠上對齊，配合捲動 */
            min-height: 100vh;
            margin: 0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden; /* 防止左右滑動 */
            overflow-y: auto;   /* 開放垂直滑動，避免內容被遮擋 */
            color: #004080;
            position: relative;
        }

        /* 背景動態泡泡裝飾 */
        .bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
        }

        /* 將內容層級拉高，避免被泡泡蓋住 */
        .content-wrapper {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 1.5rem;
            padding-bottom: 3rem; /* 底部多留一些空間給開獎文字 */
        }

        /* 轉盤容器，稍微縮小整體尺寸以適應更多手機螢幕 */
        .wheel-container {
            position: relative;
            width: 290px;  /* 微調縮小 */
            height: 290px; /* 微調縮小 */
            margin-bottom: 1.5rem; /* 縮減底部間距 */
            margin-top: 0.5rem;
            border-radius: 50%;
            background-color: #ffffff;
            padding: 8px; /* 留出白邊 */
            box-shadow: 0 12px 25px rgba(0, 91, 181, 0.2); 
        }

        /* 水滴形狀的指針 (亮橘色) */
        .pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 40px solid #ff6b00; /* 海報上的亮橘色 */
            z-index: 20;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.2));
        }

        /* 畫布本身設定 */
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
        }

        /* 立體Ｑ彈亮橘色按鈕 */
        .action-btn {
            background: linear-gradient(to bottom, #ff9e3d, #ff6b00);
            border: 4px solid #ffffff;
            color: #ffffff;
            text-shadow: 1px 2px 0px #cc5500;
            transition: all 0.1s ease;
            cursor: pointer;
            border-radius: 50px;
            letter-spacing: 2px;
            box-shadow: 0 8px 0 #cc5500, 0 15px 20px rgba(0,0,0,0.15);
        }

        .action-btn:active:not(:disabled) {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #cc5500, 0 5px 10px rgba(0,0,0,0.15);
        }

        .action-btn:disabled {
            background: #b0c4de;
            box-shadow: 0 8px 0 #879ab5;
            text-shadow: none;
            border-color: #f0f8ff;
            cursor: not-allowed;
        }
        
        /* 結果文字的童趣提示框 */
        .result-box {
            background: #ffffff;
            border: 4px solid #005bb5;
            padding: 12px 20px;
            border-radius: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 rgba(0, 91, 181, 0.2);
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 用戶個人資料區塊樣式 (童趣風) */
        .profile-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #ffffff;
            border: 3px solid #005bb5;
            border-radius: 50px; /* 圓角 */
            padding: 6px 16px 6px 6px;
            margin-bottom: 0.5rem;
            box-shadow: 0 4px 0 rgba(0, 91, 181, 0.2);
            z-index: 20; /* 確保在泡泡上方 */
        }
        .profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #00a0e9;
            object-fit: cover;
        }

        /* 模仿海報的超立體漫畫風標題 */
        .title-comic {
            color: #00a0e9; /* 亮水藍色 */
            /* 配合字體縮小，微調文字陰影的厚度比例 */
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px  4px 0 #004080;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            font-size: 2rem; /* 縮小三分之一的標題大小 */
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <!-- CSS 漂浮氣泡特效 -->
    <div class="bubbles">
        <div class="bubble" style="left: 10%; width: 40px; height: 40px; animation-duration: 6s; animation-delay: 0s;"></div>
        <div class="bubble" style="left: 25%; width: 20px; height: 20px; animation-duration: 4s; animation-delay: 2s;"></div>
        <div class="bubble" style="left: 70%; width: 50px; height: 50px; animation-duration: 7s; animation-delay: 1s;"></div>
        <div class="bubble" style="left: 85%; width: 30px; height: 30px; animation-duration: 5s; animation-delay: 3s;"></div>
    </div>

    <div class="content-wrapper max-w-md px-4">

        <!-- 用戶資料顯示區塊 (預設隱藏，取得資料後再顯示) -->
        <div id="profileContainer" class="profile-box hidden">
            <img id="userAvatar" src="" alt="Avatar" class="profile-avatar">
            <p id="userName" class="text-base text-blue-800 font-bold m-0">載入中...</p>
        </div>

        <!-- 卡通風格標題 -->
        <h1 class="font-black title-comic mt-2">抽獎轉盤</h1>
        <p class="text-sm text-blue-700 font-bold mb-6 bg-white/60 px-4 py-1 rounded-full border border-blue-200 shadow-sm">完成任務，挑戰好禮！</p>
        
        <div class="wheel-container mx-auto">
            <!-- 橘色指針 -->
            <div class="pointer"></div>
            <!-- 畫布大小維持 600 -->
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
        </div>

        <!-- 立體橘色按鈕 (稍微把上下 padding 調小一點點) -->
        <button id="spinBtn" class="action-btn font-black py-3 px-10 text-2xl w-full max-w-[280px]">
            GO ! 抽獎
        </button>

        <!-- 結果顯示區塊 -->
        <div class="mt-6 w-full result-box hidden" id="resultContainer">
            <p id="resultText" class="text-xl font-black text-orange-500 m-0"></p>
        </div>
    </div>

    <script>
        // === LINE LIFF 整合邏輯 ===
        // 請將下方的字串替換成你在 LINE Developers 申請到的 LIFF ID
        const myLiffId = "2010042972-TAJHISto"; 

        async function initializeLiff() {
            try {
                await liff.init({ liffId: myLiffId });
                if (liff.isLoggedIn()) {
                    getUserProfile();
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF 初始化失敗:", err);
                document.getElementById("userName").innerText = "遊客模式 (LIFF 未載入)";
                document.getElementById("profileContainer").classList.remove("hidden");
                // 為了展示效果，如果失敗也給個預設頭像
                document.getElementById("userAvatar").src = "https://via.placeholder.com/40/00a0e9/ffffff?text=U";
            }
        }

        async function getUserProfile() {
            try {
                const profile = await liff.getProfile();
                document.getElementById("userName").innerText = profile.displayName;
                if (profile.pictureUrl) {
                    document.getElementById("userAvatar").src = profile.pictureUrl;
                } else {
                    document.getElementById("userAvatar").style.display = "none";
                }
                document.getElementById("profileContainer").classList.remove("hidden");
            } catch (err) {
                console.error("取得用戶資料失敗:", err);
            }
        }

        // === 1. 設定獎項與機率 (改為海報上的明亮、高飽和色彩) ===
        const prizes = [
            { text: "7-11 500元禮券", color: "#ff9e3d", probability: 5 },      // 亮橘色
            { text: "親水庭園門票", color: "#54c8ff", probability: 10 },     // 淺水藍
            { text: "台北好水飲水瓶", color: "#ffde3b", probability: 15 },     // 太陽黃
            { text: "再玩一次", color: "#25a8ff", probability: 20 }, // 鮮豔藍
            { text: "銘謝惠顧", color: "#ffffff", probability: 50 }  // 純白 (搭配藍字)
        ];

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultText = document.getElementById("resultText");
        const resultContainer = document.getElementById("resultContainer");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = centerX - 4; // 稍微往內縮，確保邊緣線條完整
        const sliceAngle = (Math.PI * 2) / prizes.length;

        let currentRotation = 0;
        let isSpinning = false;

        // === 2. 繪製活潑感轉盤 ===
        function drawWheel(rotationAngle = 0) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotationAngle);

            // 繪製每個扇形
            for (let i = 0; i < prizes.length; i++) {
                const startAngle = i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, startAngle, endAngle);
                ctx.fillStyle = prizes[i].color;
                ctx.fill();
                
                // 扇形之間的白色粗分隔線
                ctx.lineWidth = 6; 
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                // 畫文字
                ctx.save();
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                
                // 動態判斷字體大小：銘謝惠顧和再玩一次字數少，可以放大
                let fontSize = (prizes[i].text === "銘謝惠顧" || prizes[i].text === "再玩一次") ? 36 : 24;
                ctx.font = `900 ${fontSize}px 'Noto Sans TC', sans-serif`;
                
                const textX = radius - 30; // 稍微往外推一點
                const maxTextWidth = radius - 80; // 設定文字最大寬度，避免與中心重疊
                
                // 如果是深色背景(如鮮豔藍)，給文字加一點白邊讓它跳出來
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#ffffff";
                if (prizes[i].color === "#25a8ff" || prizes[i].color === "#ff9e3d") {
                     ctx.strokeText(prizes[i].text, textX, 0, maxTextWidth);
                }

                ctx.fillStyle = "#004080"; // 深藍色文字
                ctx.fillText(prizes[i].text, textX, 0, maxTextWidth);
                
                ctx.restore();
            }
            
            // 繪製轉盤外圍邊框 (深藍色內圈)
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#005bb5'; 
            ctx.stroke();

            // 轉盤中心的裝飾圓餅 (像是可愛的按鈕)
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#ff6b00'; // 橘色中心框
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(0, 0, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#005bb5'; // 中心小藍點
            ctx.fill();
            
            ctx.restore();
        }

        // 確保字體載入後再繪製初始轉盤
        document.fonts.ready.then(function () {
            drawWheel();
            // 頁面載入並畫好轉盤後，執行 LIFF 初始化
            initializeLiff();
        });

        // === 3. 機率計算演算法 ===
        function getWinnerIndex() {
            const totalProbability = prizes.reduce((sum, prize) => sum + prize.probability, 0);
            let randomNum = Math.random() * totalProbability;
            let currentSum = 0;
            for (let i = 0; i < prizes.length; i++) {
                currentSum += prizes[i].probability;
                if (randomNum <= currentSum) {
                    return i;
                }
            }
            return prizes.length - 1;
        }

        // === 4. 旋轉動畫邏輯 ===
        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            resultContainer.classList.add("hidden");
            resultText.innerText = "";
            spinBtn.disabled = true;
            spinBtn.innerText = "轉動中...";

            const winnerIndex = getWinnerIndex();
            const winnerCenterAngle = winnerIndex * sliceAngle + (sliceAngle / 2);
            
            const spins = 8; 
            const targetRotation = currentRotation + (Math.PI * 2 * spins) + (Math.PI * 3 / 2) - (currentRotation % (Math.PI * 2)) - winnerCenterAngle;

            const duration = 4500; // 4.5秒
            const startTime = performance.now();
            const startRotation = currentRotation;

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                const easeOutProgress = 1 - Math.pow(1 - progress, 3); 

                currentRotation = startRotation + (targetRotation - startRotation) * easeOutProgress;
                drawWheel(currentRotation);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    spinBtn.disabled = false;
                    spinBtn.innerText = "再抽一次！";
                    
                    // 顯示結果
                    resultContainer.classList.remove("hidden");
                    
                    if (prizes[winnerIndex].text === "銘謝惠顧") {
                        resultText.style.color = "#005bb5"; 
                        resultText.innerText = "哎呀！銘謝惠顧 💦";
                    } else {
                        resultText.style.color = "#ff6b00"; 
                        resultText.innerText = `🎉 恭喜抽中：${prizes[winnerIndex].text} !`;
                    }
                    
                    // 確保結果顯示後可以捲動到底部
                    setTimeout(() => {
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }, 100);
                }
            }

            requestAnimationFrame(animate);
        }

        spinBtn.addEventListener("click", spin);

    </script>
</body>
</html>
